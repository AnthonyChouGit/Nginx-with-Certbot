server {
  listen 80;
  server_name nozomu-ac.top www.nozomu-ac.top;

  location / {
    return 301 https://$host$request_uri;
  }

  location /.well-known/acme-challenge {
    root /acme;
  }
}

upstream poseidon_backend {
  server poseidon_backend:3000;
}

server {
  listen 443 ssl;
  server_name nozomu-ac.top www.nozomu-ac.top;
  ssl_certificate /etc/letsencrypt/live/my_site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/my_site/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

  location /subscribe/fqwp8u289jfaj2938 {
    alias /subscribe/config.yml;
  }
  
  location / {
    root /public/poseidon;
    try_files $uri $uri/ /index.html;
  }

  location /api {
    proxy_pass http://poseidon_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /media {
    root /public;
  }
}
